apis:
  - aid: sastrify:sastrify-platform
    name: Sastrify Platform
    description: >-
      The Sastrify platform provides SaaS management capabilities including
      software discovery, license optimization, vendor negotiations, and
      benchmark insights. It offers native integrations with accounting
      software, SSO providers, and SaaS tools for usage analytics and spend
      visibility. The platform does not expose a public developer API;
      integration is handled through native connectors and the vendor management
      workflow.
